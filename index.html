<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Creative To-Do App</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

</head>

<body>

    <!-- Main Container -->
    <div class="app">

        <!-- Left Section -->
        <div class="left-section">

            <h1>✨ Creative To-Do App</h1>

            <p class="subtitle">
                Organize your daily tasks beautifully 🚀
            </p>

            <!-- Input Area -->
            <div class="input-box">

                <!-- Task Input -->
                <input type="text"
                    id="todoInput"
                    placeholder="Enter task">

                <!-- Character Counter -->
                <small id="charCount">
                    0 / 10
                </small>

                <!-- Description -->
                <textarea id="todoDescription"
                    placeholder="Enter description"></textarea>

                <!-- Add Button -->
                <button id="addBtn">
                    ➕ Add Task
                </button>

                <!-- Error Message -->
                <p id="errorMessage"></p>

            </div>

        </div>

        <!-- Right Section -->
        <div class="right-section">

            <h2>📋 Your Tasks</h2>

            <!-- Empty State -->
            <div id="emptyState">
                No tasks added yet 😴
            </div>

            <!-- Todo List -->
            <ul id="todoList"></ul>

        </div>

    </div>

    <!-- JavaScript -->
    <script src="script.js"></script>

</body>

</html>
