<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Creative To-Do App</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

</head>

<body>

    <!-- Main Wrapper -->
    <div class="app">

        <!-- Left Side -->
        <div class="left-section">

            <h1>✨ Creative To-Do App</h1>

            <p class="subtitle">
                Organize your daily tasks beautifully 🚀
            </p>

            <!-- Input Box -->
            <div class="input-box">

            <!-- Character Counter -->
            <small id="charCount">0 / 10</small>

               
                <!-- Description -->
                <textarea id="todoDescription"
                    placeholder="Enter task description"></textarea>

                <!-- Add Button -->
                <button id="addBtn">
                    ➕ Add Task
                </button>

                <!-- Error Message -->
                <p id="errorMessage"></p>

            </div>

        </div>

        <!-- Right Side -->
        <div class="right-section">

            <h2>📋 Your Tasks</h2>

            <!-- Empty State -->
            <div id="emptyState">

                No tasks added yet 😴

            </div>

            <!-- Task List -->
            <ul id="todoList"></ul>

        </div>

    </div>

    <!-- JS -->
    <script src="script.js"></script>

</body>

</html>
